<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI RPG Engine — API Test</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 { color: #4ec9b0; border-bottom: 2px solid #4ec9b0; padding-bottom: 8px; }
        h2 { color: #9cdcfe; margin-top: 0; font-size: 15px; margin-bottom: 10px; }
        .grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 16px;
        }
        .panel {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 7px 14px;
            margin: 3px 3px 3px 0;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        button:hover { background: #1177bb; }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
        button.attack { background: #c03030; }
        button.attack:hover { background: #d04040; }
        button.skill { background: #8a2be2; }
        button.skill:hover { background: #9a3bf2; }
        button.item { background: #2e8b57; }
        button.item:hover { background: #3e9b67; }
        button.escape { background: #6b6b6b; }
        button.rest { background: #b8860b; }
        input, select {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 5px 9px;
            margin: 2px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 12px;
        }
        pre {
            background: #0d1117;
            color: #c9d1d9;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 450px;
            overflow-y: auto;
            font-size: 11px;
            margin: 6px 0;
        }
        .status-line {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }
        .status-line .label { color: #9cdcfe; }
        .status-line .value { color: #ce9178; }
        .hp-bar, .mp-bar, .exp-bar {
            height: 10px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin: 3px 0;
        }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #c03030, #ef4444); transition: width 0.3s; }
        .mp-fill { height: 100%; background: linear-gradient(90deg, #0e639c, #3b82f6); transition: width 0.3s; }
        .exp-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #fbbf24); transition: width 0.3s; }
        .battle-panel { border-color: #c03030; background: #2b1f1f; }
        .messages {
            background: #0d1117;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            margin: 6px 0;
            max-height: 180px;
            overflow-y: auto;
        }
        .messages div { padding: 2px 0; color: #dcdcaa; border-bottom: 1px dotted #333; }
        .event-banner {
            background: #1a3d2a;
            color: #4ec9b0;
            padding: 8px;
            border-radius: 4px;
            margin: 6px 0;
            font-weight: bold;
            text-align: center;
        }
        .section-hint { color: #6a9955; font-size: 10px; margin: 4px 0; }
        .enemy-name { color: #f48771; font-size: 16px; font-weight: bold; }
        .error-msg { color: #f48771; padding: 6px; }
    </style>
</head>
<body>
    <h1>🎮 AI RPG Engine — API Test UI</h1>
    <p style="color:#6a9955; font-size:12px;">
        개발용 테스트 인터페이스. 실제 웹 UI는 여름방학에 구축 예정.
    </p>

    <div class="grid">
        <!-- 왼쪽: 컨트롤 패널 -->
        <div>
            <!-- 게임 시작 -->
            <div class="panel">
                <h2>📝 게임 시작</h2>
                <input id="playerName" placeholder="이름" value="테스터" style="width:100px;">
                <select id="playerJob">
                    <option value="전사">전사</option>
                    <option value="마법사">마법사</option>
                    <option value="탱커">탱커</option>
                    <option value="도적">도적</option>
                </select>
                <button onclick="newGame()">새 게임</button>
                <div class="section-hint">POST /api/new_game</div>
            </div>

            <!-- 상태 -->
            <div class="panel">
                <h2>📊 플레이어 상태</h2>
                <div id="playerStatus" style="color:#6a9955;">게임을 시작하세요</div>
                <div style="margin-top:8px;">
                    <button onclick="fetchStatus()">상태 새로고침</button>
                </div>
                <div class="section-hint">GET /api/status</div>
            </div>

            <!-- 필드 액션 -->
            <div class="panel" id="fieldPanel">
                <h2>🗺️ 필드 액션</h2>
                <div style="color:#6a9955; font-size:10px; margin-bottom:6px;">
                    ※ 본게임에선 회복/수련/MP회복은 탐험 이벤트로만 등장 — 테스트용 버튼
                </div>
                <div id="fieldActions">
                    <button onclick="explore()">🗺️ 탐험</button>
                    <button class="rest" onclick="rest('heal')">💚 HP 회복</button>
                    <button class="rest" onclick="restoreMp()">💙 MP 회복</button>
                    <button class="rest" onclick="rest('train')">🏋️ 수련</button>
                </div>
                <div id="fieldItems" style="margin-top:10px;"></div>
                <div class="section-hint">POST /api/explore, /api/rest, /api/use_item</div>
            </div>
        </div>

        <!-- 오른쪽: 전투 / 로그 -->
        <div>
            <!-- 전투 패널 -->
            <div class="panel" id="battlePanel" style="display:none;">
                <h2>⚔️ 전투 중</h2>
                <div id="battleState"></div>
                <div class="section-hint">POST /api/battle/action</div>
            </div>

            <!-- 이벤트 배너 -->
            <div id="eventBanner"></div>

            <!-- API 로그 -->
            <div class="panel">
                <h2>📡 API 응답 로그</h2>
                <button onclick="clearLog()" style="background:#555;">Clear</button>
                <pre id="log">서버 응답이 여기 표시됩니다.</pre>
            </div>
        </div>
    </div>

<script>
let currentPlayer = null;
let currentBattle = null;

function log(tag, data) {
    const el = document.getElementById("log");
    const ts = new Date().toLocaleTimeString();
    const text = typeof data === "string" ? data : JSON.stringify(data, null, 2);
    el.textContent = `[${ts}] ${tag}\n${text}\n\n` + el.textContent;
}

function clearLog() {
    document.getElementById("log").textContent = "";
}

async function api(method, path, body) {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    // POST는 body 없어도 빈 JSON 보내서 415 방지
    if (method === "POST") opts.body = JSON.stringify(body || {});
    try {
        const res = await fetch(path, opts);
        const data = await res.json();
        log(`${method} ${path} → ${res.status}`, data);
        return { ok: res.ok, status: res.status, data };
    } catch (e) {
        log(`${method} ${path} → NETWORK ERROR`, e.toString());
        return { ok: false, status: 0, data: null };
    }
}

function showEvent(text, color="#4ec9b0") {
    const el = document.getElementById("eventBanner");
    el.innerHTML = `<div class="event-banner" style="color:${color}">${text}</div>`;
    setTimeout(() => { el.innerHTML = ""; }, 4000);
}

function showError(text) {
    showEvent(`⚠️ ${text}`, "#f48771");
}

// ─── 게임 시작 ───────────────────────────
async function newGame() {
    const name = document.getElementById("playerName").value.trim();
    const job  = document.getElementById("playerJob").value;
    if (!name) return alert("이름을 입력하세요");

    const r = await api("POST", "/api/new_game", { name, job });
    if (!r.ok || !r.data || !r.data.ok) {
        showError(r.data?.error || "게임 시작 실패");
        return;
    }
    currentPlayer = r.data.player;
    currentBattle = null;
    renderAll();
    showEvent(`🎉 ${name} (${job}) 게임 시작!`);
}

// ─── 상태 조회 ───────────────────────────
async function fetchStatus() {
    const r = await api("GET", "/api/status");
    if (!r.ok || !r.data?.ok) {
        if (r.status === 404) {
            // 아직 게임 세션 없음 (첫 접속)
            return;
        }
        showError(r.data?.error || "상태 조회 실패");
        return;
    }
    currentPlayer = r.data.player;
    // 전투 중이면 전투 상태도 가져오기
    if (r.data.in_battle) {
        await fetchBattleState();
    } else {
        currentBattle = null;
    }
    renderAll();
}

async function fetchBattleState() {
    const r = await api("GET", "/api/battle/state");
    if (r.ok && r.data?.ok) {
        currentBattle = r.data;
    }
}

// ─── 탐험 ────────────────────────────────
async function explore() {
    const r = await api("POST", "/api/explore");
    if (!r.ok || !r.data?.ok) {
        showError(r.data?.error || "탐험 실패");
        return;
    }
    const data = r.data;

    // 이벤트 종류에 따라 배너 표시
    // App.py가 보내는 실제 키: "battle", "midboss", "finalboss",
    //                         "item", "rest", "nothing"
    const event = data.event;
    if (event === "battle") {
        currentBattle = data.battle_state;
        showEvent(`⚔️ 전투 발생: ${data.enemy?.name || "?"}`, "#f48771");
    } else if (event === "item") {
        showEvent(`🎁 아이템 획득: ${data.item || ""}`);
    } else if (event === "rest") {
        showEvent(`💤 휴식 지점 도착 — 회복/수련 가능`);
    } else if (event === "midboss" || event === "finalboss") {
        currentBattle = data.battle_state;
        showEvent(`👹 보스 출현: ${data.enemy?.name || "?"}`, "#f48771");
    } else if (event === "gameover") {
        showEvent(`💀 게임 오버 — HP가 0입니다. 새 게임을 시작하세요.`, "#f48771");
    } else if (event === "nothing") {
        showEvent(`... 아무 일도 일어나지 않았다`);
    } else {
        showEvent(`이벤트: ${event}`);
    }

    // ⭐ 모든 응답에 player가 있어야 좌측 UI 갱신됨
    // (App.py가 모든 explore 응답에 player를 포함하도록 수정됨)
    if (data.player) currentPlayer = data.player;
    renderAll();
}

// ─── 휴식 ────────────────────────────────
async function rest(choice) {
    const r = await api("POST", "/api/rest", { choice });
    if (!r.ok || !r.data?.ok) {
        showError(r.data?.error || "휴식 실패");
        return;
    }
    if (r.data.player) currentPlayer = r.data.player;
    showEvent(r.data.message || "휴식 완료");
    renderAll();
}

// ─── MP 회복 (테스트용) ───────────────────
// 본게임에선 "mp" 이벤트를 통해서만 회복됨.
// 테스트 편의를 위한 버튼이며, 서버의 /api/rest choice=mp를 호출.
async function restoreMp() {
    const r = await api("POST", "/api/rest", { choice: "mp" });
    if (!r.ok || !r.data?.ok) {
        showError(r.data?.error || "MP 회복 실패");
        return;
    }
    if (r.data.player) currentPlayer = r.data.player;
    showEvent(r.data.message || "MP 회복");
    renderAll();
}

// ─── 전투 액션 ───────────────────────────
async function battleAction(action) {
    const r = await api("POST", "/api/battle/action", { action });
    if (!r.ok || !r.data?.ok) {
        showError(r.data?.error || "전투 행동 실패");
        return;
    }
    const data = r.data;

    // 전투 종료 여부
    if (data.done) {
        currentBattle = null;
        if (data.winner === "player") {
            showEvent(`🏆 승리! EXP +${data.exp_gained || 0}`, "#4ec9b0");
        } else if (data.winner === "enemy") {
            showEvent(`💀 패배...`, "#f48771");
        } else if (data.winner === "escaped") {
            showEvent(`🏃 도망 성공`);
        }
        if (data.player) currentPlayer = data.player;
    } else {
        // 전투 계속 — battle_state 형식 맞추기
        currentBattle = data;
    }
    renderAll();
}

// ─── 필드 아이템 사용 ────────────────────
async function useFieldItem(name) {
    const r = await api("POST", "/api/use_item", { item: name });
    if (!r.ok || !r.data?.ok) {
        showError(r.data?.error || "아이템 사용 실패");
        return;
    }
    if (r.data.player) currentPlayer = r.data.player;
    showEvent(r.data.message || `${name} 사용`);
    renderAll();
}

// ─── 렌더링 ──────────────────────────────
function renderAll() {
    renderPlayer();
    renderBattle();
    renderFieldItems();
    renderFieldActions();
}

function renderPlayer() {
    const p = currentPlayer;
    if (!p) {
        document.getElementById("playerStatus").innerHTML =
            "<span style='color:#6a9955;'>게임을 시작하세요</span>";
        return;
    }
    const hpPct = p.maxhp > 0 ? (p.hp / p.maxhp * 100).toFixed(0) : 0;
    const mpPct = p.maxmp > 0 ? (p.mp / p.maxmp * 100).toFixed(0) : 0;
    const expPct = p.maxexp > 0 ? (p.exp / p.maxexp * 100).toFixed(0) : 0;
    document.getElementById("playerStatus").innerHTML = `
        <div class="status-line"><span class="label">이름</span><span class="value">${p.name} (${p.job})</span></div>
        <div class="status-line"><span class="label">레벨</span><span class="value">${p.lv}</span></div>
        <div style="margin-top:6px;">HP: ${Math.round(p.hp)}/${p.maxhp}</div>
        <div class="hp-bar"><div class="hp-fill" style="width:${hpPct}%"></div></div>
        <div>MP: ${Math.round(p.mp)}/${p.maxmp}</div>
        <div class="mp-bar"><div class="mp-fill" style="width:${mpPct}%"></div></div>
        <div>EXP: ${p.exp}/${p.maxexp}</div>
        <div class="exp-bar"><div class="exp-fill" style="width:${expPct}%"></div></div>
        <div class="status-line"><span class="label">STG</span><span class="value">${p.stg}</span></div>
        <div class="status-line"><span class="label">ARM</span><span class="value">${p.arm}</span></div>
        <div class="status-line"><span class="label">SP</span><span class="value">${p.sp}</span></div>
        <div class="status-line"><span class="label">SPD</span><span class="value">${p.spd}</span></div>
        <div class="status-line"><span class="label">LUC</span><span class="value">${p.luc}</span></div>
    `;
}

function renderBattle() {
    const panel = document.getElementById("battlePanel");
    const b = currentBattle;

    if (!b) {
        panel.style.display = "none";
        return;
    }
    panel.style.display = "block";

    const eHpPct = b.enemy_maxhp > 0 ? (b.enemy_hp / b.enemy_maxhp * 100).toFixed(0) : 0;
    const pHpPct = b.player_maxhp > 0 ? (b.player_hp / b.player_maxhp * 100).toFixed(0) : 0;
    const pMpPct = b.player_maxmp > 0 ? (b.player_mp / b.player_maxmp * 100).toFixed(0) : 0;

    // 몬스터 상세 정보 (enemy_info가 있으면 사용, 없으면 기본 표시)
    const info = b.enemy_info || {};
    const diffLabel = info.difficulty_label || "";
    const diffColor = {
        "강함": "#f48771",
        "중간": "#dcdcaa",
        "약함": "#4ec9b0",
    }[diffLabel] || "#888";

    // 난이도 뱃지
    const diffBadge = diffLabel
        ? `<span style="background:${diffColor}22; color:${diffColor};
             border:1px solid ${diffColor}; padding:2px 8px; border-radius:10px;
             font-size:11px; margin-left:6px;">${diffLabel}</span>`
        : "";

    // 레벨 뱃지
    const lvBadge = info.lv
        ? `<span style="color:#9cdcfe; font-size:12px; margin-left:6px;">Lv.${info.lv}</span>`
        : "";

    // 몬스터 스탯 테이블
    const statTable = info.name ? `
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:4px;
                    font-size:11px; margin-top:6px; padding:6px;
                    background:#1a1a1a; border-radius:3px;">
            <div><span style="color:#9cdcfe;">STG</span> ${info.stg}</div>
            <div><span style="color:#9cdcfe;">ARM</span> ${info.arm}</div>
            <div><span style="color:#9cdcfe;">SP</span> ${info.sp}</div>
            <div><span style="color:#9cdcfe;">SPARM</span> ${info.sparm}</div>
            <div><span style="color:#9cdcfe;">SPD</span> ${info.spd}</div>
            <div><span style="color:#9cdcfe;">LUC</span> ${info.luc}</div>
            <div><span style="color:#9cdcfe;">MP</span> ${Math.round(info.mp)}/${Math.round(info.maxmp)}</div>
            <div></div>
        </div>
    ` : "";

    // 메시지 (최근 것이 위로)
    const msgs = (b.messages || []).slice(-12).reverse();
    const msgHtml = msgs.length
        ? `<div class="messages">${msgs.map(m => `<div>${escapeHtml(m)}</div>`).join("")}</div>`
        : "";

    // 스킬 버튼
    const skills = b.skills || [];
    const skillButtons = skills.map(s =>
        `<button class="skill" ${s.usable ? "" : "disabled"} title="MP ${s.mp}"
         onclick="battleAction('skill:${s.name}')">🔮 ${s.name} (MP ${s.mp})</button>`
    ).join("");

    // 전투 중 아이템 버튼
    const items = b.items || [];
    const itemButtons = items.map(i =>
        `<button class="item" onclick="battleAction('item:${i.name}')">💊 ${i.name} ×${i.count}</button>`
    ).join("");

    panel.innerHTML = `
        <h2>⚔️ 전투 중 <span style="color:#888;font-size:12px;">(턴 ${b.turn})</span></h2>
        <div class="enemy-name">
            ${b.enemy_name}${lvBadge}${diffBadge}
        </div>
        <div>HP: ${Math.round(b.enemy_hp)}/${b.enemy_maxhp}</div>
        <div class="hp-bar"><div class="hp-fill" style="width:${eHpPct}%"></div></div>
        ${statTable}

        ${msgHtml}

        <div style="margin-top:8px; padding-top:8px; border-top:1px solid #444;">
            <strong>내 상태</strong>
            <div>HP: ${Math.round(b.player_hp)}/${b.player_maxhp}</div>
            <div class="hp-bar"><div class="hp-fill" style="width:${pHpPct}%"></div></div>
            <div>MP: ${Math.round(b.player_mp)}/${b.player_maxmp}</div>
            <div class="mp-bar"><div class="mp-fill" style="width:${pMpPct}%"></div></div>
        </div>

        <div style="margin-top:10px;">
            <button class="attack" onclick="battleAction('attack')">⚔️ 공격</button>
            <button class="escape" onclick="battleAction('escape')">🏃 도망</button>
        </div>
        ${skillButtons ? `<div style="margin-top:6px;">${skillButtons}</div>` : ""}
        ${itemButtons ? `<div style="margin-top:6px;">${itemButtons}</div>` : ""}
    `;
}

function renderFieldItems() {
    const el = document.getElementById("fieldItems");
    const items = currentPlayer?.items || [];
    if (items.length === 0) {
        el.innerHTML = "<div style='color:#6a9955; font-size:11px;'>아이템 없음</div>";
        return;
    }
    // count 집계
    const counts = {};
    items.forEach(name => counts[name] = (counts[name] || 0) + 1);
    const html = Object.entries(counts).map(([name, cnt]) =>
        `<button class="item" onclick="useFieldItem('${name}')">${name} ×${cnt}</button>`
    ).join("");
    el.innerHTML = `<div style="font-size:11px; color:#9cdcfe; margin-bottom:4px;">아이템 (필드 사용)</div>${html}`;
}

function renderFieldActions() {
    // 전투 중이면 필드 액션 비활성화
    const inBattle = !!currentBattle;
    document.querySelectorAll("#fieldActions button").forEach(btn => {
        btn.disabled = inBattle;
    });
}

function escapeHtml(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

// 페이지 로드 시 기존 세션 확인
window.addEventListener("load", fetchStatus);
</script>
</body>
</html>
